    .portafolio-section {
      padding: 60px 0 80px;
      min-height: calc(100vh - 60px);
    }

    .portafolio-header {

      margin-bottom: 48px;

    .portafolio-title {
      font-size: 3rem;
      font-weight: 700;
      margin-bottom: 0.75rem;
      line-height: 1.2;
    }

    .portafolio-subtitle {
      font-size: 1.125rem;
      color: var(--text-secondary);
      max-width: 560px;
      margin: 0 auto;
      line-height: 1.6;
    }

    .proyectos-list {
      display: flex;
      flex-direction: column;
      gap: 12px;
      max-width: 800px;
      margin: 0 auto;
    }

    .proyecto-card {
      display: grid;
      grid-template-columns: 52px 1fr;
      gap: 20px;
      align-items: start;
      background: var(--card-bg);
      border: 1px solid var(--border);
      border-radius: var(--radius-lg);
      padding: 22px 24px;
      text-decoration: none;
      color: inherit;
      transition: border-color 0.2s ease, background 0.2s ease;
    }

    .proyecto-card:hover {
      border-color: var(--border-light);
      background: var(--surface);
    }

    .proyecto-numero {
      width: 44px;
      height: 44px;
      border-radius: 50%;
      background:
        linear-gradient(#1a1a1a 0 0) padding-box,
        linear-gradient(90deg, #2674ed, #7c3aed, #ec4899) border-box;
      border: 2px solid transparent;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 0.875rem;
      font-weight: 600;
      color: var(--text-secondary);
      flex-shrink: 0;
      margin-top: 2px;
    }

    .proyecto-body {
      display: flex;
      flex-direction: column;
      gap: 5px;
    }

    .proyecto-fecha {
      font-size: 0.7rem;
      font-weight: 500;
      color: var(--text-secondary);
      letter-spacing: 0.02em;
    }

    .proyecto-nombre {
      font-size: 1rem;
      font-weight: 600;
      color: var(--text);
      line-height: 1.35;
    }

    .proyecto-descripcion {
      font-size: 0.875rem;
      color: var(--text-secondary);
      line-height: 1.6;
      margin: 0;
    }

    /* Skeletons */
    .skeleton {
      display: grid;
      grid-template-columns: 52px 1fr;
      gap: 20px;
      align-items: start;
      background: var(--card-bg);
      border: 1px solid var(--border);
      border-radius: var(--radius-lg);
      padding: 22px 24px;
    }

    .skeleton-circle {
      width: 44px;
      height: 44px;
      background: var(--surface);
      animation: shimmer 1.5s infinite;
    }

    .skeleton-body {
      display: flex;
      flex-direction: column;
      gap: 10px;
      padding-top: 4px;
    }

    .skeleton-line {
      height: 13px;
      border-radius: 6px;
      background: var(--surface);
      animation: shimmer 1.5s infinite;
    }

    .skeleton-line.short  { width: 25%; }
    .skeleton-line.medium { width: 55%; }
    .skeleton-line.long   { width: 88%; }
    .skeleton-line.full   { width: 100%; }

    @keyframes shimmer {
      0%, 100% { opacity: 1; }
      50%       { opacity: 0.4; }
    }

    .estado-vacio,
    .estado-error {
      text-align: center;
      padding: 4rem 1rem;
      color: var(--text-secondary);
    }

    @media (max-width: 768px) {
      .portafolio-section { padding: 40px 0 60px; }

      .portafolio-title { font-size: 2rem; }

      .portafolio-subtitle {
        font-size: 1rem;
        padding: 0 16px;
      }

      .proyecto-card,
      .skeleton {
        grid-template-columns: 40px 1fr;
        gap: 14px;
        padding: 16px 18px;
      }

      .proyecto-numero,
      .skeleton-circle {
        width: 36px;
        height: 36px;
        font-size: 0.8rem;
      }

      .site-footer .footer-inner {
        text-align: center;
        display: flex;
        flex-direction: column;
        align-items: center;
        gap: 1rem;
      }

      .site-footer .social { justify-content: center; }
    }

  <script>
    function parseFecha(str) {
      if (!str) return null;
      // D/MM/YYYY o DD/MM/YYYY
      const m = str.match(/^(\d{1,2})\/(\d{1,2})\/(\d{4})$/);
      if (m) return new Date(+m[3], +m[2] - 1, +m[1]);
      // YYYY-MM-DD o YYYY-MM
      if (/^\d{4}-\d{2}/.test(str)) {
        const p = str.split("-");
        return new Date(+p[0], +p[1] - 1, +p[2] || 1);
      }
      return null;
    }

    function formatFecha(fechaStr) {
      const meses = ['Ene', 'Feb', 'Mar', 'Abr', 'May', 'Jun', 'Jul', 'Ago', 'Sep', 'Oct', 'Nov', 'Dic'];
      const d = parseFecha(fechaStr);
      if (!d) return fechaStr || '';
      return meses[d.getMonth()] + ' ' + d.getFullYear();
    }

    async function loadPortafolio() {
      try {
        const proyectos = await GoogleSheets.getPortafolio();

        if (!proyectos || proyectos.length === 0) {
          renderVacio();
          return;
        }

        // Ordenar por fecha-publicacion descendente
        proyectos.sort((a, b) => {
          const fa = parseFecha(a['fecha-publicacion']);
          const fb = parseFecha(b['fecha-publicacion']);
          if (!fa && !fb) return 0;
          if (!fa) return 1;
          if (!fb) return -1;
          return fb - fa;
        });

        renderProyectos(proyectos);
      } catch (error) {
        console.error('Error cargando portafolio:', error);
        renderError();
      }
    }

    function renderProyectos(proyectos) {
      const lista = document.getElementById('proyectos-list');
      lista.innerHTML = proyectos.map((p, i) => `
        <a class="proyecto-card" href="${p.link || '#'}">
          <div class="proyecto-numero">${p.numeracion || i + 1}</div>
          <div class="proyecto-body">
            <span class="proyecto-fecha">${formatFecha(p['fecha-publicacion'])}</span>
            <div class="proyecto-nombre">${p['nombre-proyecto'] || ''}</div>
            <p class="proyecto-descripcion">${p['descripcion-corta'] || ''}</p>
          </div>
        </a>
      `).join('');
    }

    function renderVacio() {
      document.getElementById('proyectos-list').innerHTML = `
        <div class="estado-vacio">
          <p>No hay proyectos disponibles aún.</p>
        </div>
      `;
    }

    function renderError() {
      document.getElementById('proyectos-list').innerHTML = `
        <div class="estado-error">
          <p>Error al cargar los proyectos. Por favor intenta más tarde.</p>
          <button onclick="location.reload()" style="margin-top:1rem;padding:0.75rem 1.5rem;background:#7c3aed;color:#fff;border:none;border-radius:var(--radius);cursor:pointer;">
            Reintentar
          </button>
        </div>
      `;
    }

    // Menu toggle
    const menuToggle = document.querySelector('.menu-toggle');
    const menu = document.querySelector('.menu');
    if (menuToggle && menu) {
      menuToggle.addEventListener('click', () => {
        const isOpen = menu.classList.toggle('open');
        menuToggle.setAttribute('aria-expanded', String(isOpen));
      });
    }

    loadPortafolio();
  </script>
