<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>{{titulo}} · Angel García</title>
  <meta name="description" content="{{descripcion}}" />
  <link rel="icon" type="image/png" href="/img/favicon.png" />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="/assets/styles.css" />
  <link rel="stylesheet" href="/assets/post.css" />
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/styles/github-dark.min.css" />
  {{datalayer_push}}
  <!-- Google Tag Manager -->
  <script>(function(w,d,s,l,i){w[l]=w[l]||[];w[l].push({'gtm.start':
  new Date().getTime(),event:'gtm.js'});var f=d.getElementsByTagName(s)[0],
  j=d.createElement(s),dl=l!='dataLayer'?'&l='+l:'';j.async=true;j.src=
  'https://www.googletagmanager.com/gtm.js?id='+i+dl;f.parentNode.insertBefore(j,f);
  })(window,document,'script','dataLayer','GTM-KDXJ37SD');</script>
  <!-- End Google Tag Manager -->
</head>
<body>
<!-- Google Tag Manager (noscript) -->
<noscript><iframe src="https://www.googletagmanager.com/ns.html?id=GTM-KDXJ37SD"
height="0" width="0" style="display:none;visibility:hidden"></iframe></noscript>
<!-- End Google Tag Manager (noscript) -->

<nav class="topnav">
  <div style="display:flex;align-items:center;gap:8px;">
    <button class="menu-btn" onclick="abrirSidebar()">
      <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="3" y1="6" x2="21" y2="6"/><line x1="3" y1="12" x2="21" y2="12"/><line x1="3" y1="18" x2="21" y2="18"/></svg>
    </button>
    <a class="topnav-logo" href="/">Angel García</a>
  </div>
  <div id="topnav-os-toggle" class="topnav-os-toggle"></div>
  <div class="topnav-links">
    <a href="/">Inicio</a>
    <a href="https://www.youtube.com/@angelgarciadatablog" target="_blank">YouTube</a>
    <a href="https://www.linkedin.com/in/angelgarciachanga/" target="_blank">LinkedIn</a>
  </div>
</nav>

<div class="sidebar-overlay" id="sidebarOverlay" onclick="cerrarSidebar()"></div>

<!-- SIDEBAR FIJO -->
<aside id="sidebar">
  <div class="search-box">
    <input type="text" placeholder="Buscar..." oninput="filtrarSidebar(this.value)" />
  </div>
  <nav id="sidebarNav"></nav>
</aside>

<!-- LAYOUT POST -->
<div class="post-layout">

  <article class="post-content">
    <div class="post-meta">
      <span class="post-categoria">{{categoria}}</span>
      {{sistema_operativo}}
      <span>Actualizado: {{updated}}</span>
    </div>
    <h1 class="post-titulo">{{titulo}}</h1>
    <div class="post-tags">{{tags}}</div>
    <hr class="post-divider" />
    <div class="post-body" id="post-body">{{contenido}}</div>
    {{video_youtube}}
    {{temas_relacionados}}
  </article>

  <!-- TOC DERECHO -->
  <aside class="sidebar-der">
    <div class="sidebar-section-title">En esta página</div>
    <nav class="toc-lista" id="toc"></nav>
  </aside>

</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/highlight.min.js"></script>
<script>const CURRENT_SLUG = '{{slug}}';</script>
<script src="/assets/sidebar.js"></script>
<script src="/assets/post.js"></script>

</body>
</html>
