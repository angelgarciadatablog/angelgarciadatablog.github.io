<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>{{titulo_pagina}} · Angel García</title>
  {{head_extra}}
  <link rel="icon" type="image/png" href="/img/favicon.png" />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="/assets/styles.css" />

  <style>
    .tombstone-wrap { min-height: 72vh; display:flex; align-items:center; justify-content:center; padding: 48px 20px; }
    .tombstone-card { max-width: 540px; text-align:center; background:#ffffff; border:1px solid #e5e7eb; border-radius:16px; padding:48px 40px; box-shadow:0 4px 24px rgba(0,0,0,.06); }
    .tombstone-icon { font-size: 40px; line-height:1; margin-bottom: 18px; }
    .tombstone-card h1 { font-size: 1.55rem; margin:0 0 12px; color:#111827; font-weight:700; }
    .tombstone-card p { color:#4b5563; line-height:1.65; margin:0 0 28px; font-size:1rem; }
    .tombstone-btn { display:inline-block; background:#2563eb; color:#ffffff; text-decoration:none; padding:12px 26px; border-radius:10px; font-weight:600; transition:background .2s ease; }
    .tombstone-btn:hover { background:#1d4ed8; }
  </style>
</head>
<body>

<nav class="topnav">
  <div style="display:flex;align-items:center;gap:8px;">
    <a class="topnav-logo" href="/">Angel García</a>
  </div>
  <div class="topnav-links">
    <a href="/">Inicio</a>
    <a href="https://www.youtube.com/@angelgarciadatablog" target="_blank">YouTube</a>

  </div>
</nav>

<div class="tombstone-wrap">
  <div class="tombstone-card">
    <div class="tombstone-icon">{{icono}}</div>
    <h1>{{mensaje_titulo}}</h1>
    <p>{{mensaje_texto}}</p>
    <a class="tombstone-btn" href="{{boton_url}}">{{boton_texto}}</a>
  </div>
</div>

</body>
</html>
