<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Angel García — Data Analyst</title>
  <meta name="description" content="Analista de datos. Aprendo y enseño en público." />
  <link rel="icon" type="image/png" href="/img/favicon.png" />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="/assets/styles.css" />
  <link rel="stylesheet" href="/assets/home.css" />
</head>
<body>

<nav class="topnav">
  <div style="display:flex;align-items:center;gap:8px;">
    <button class="menu-btn" onclick="abrirSidebar()">
      <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="3" y1="6" x2="21" y2="6"/><line x1="3" y1="12" x2="21" y2="12"/><line x1="3" y1="18" x2="21" y2="18"/></svg>
    </button>
    <a class="topnav-logo" href="/">Angel García</a>
  </div>
  <div id="topnav-os-toggle" class="topnav-os-toggle"></div>
  <div class="topnav-links">
    <a href="https://www.youtube.com/@angelgarciadatablog" target="_blank">YouTube</a>
    <a href="https://www.linkedin.com/in/angelgarciachanga/" target="_blank">LinkedIn</a>
  </div>
</nav>

<div class="sidebar-overlay" id="sidebarOverlay" onclick="cerrarSidebar()"></div>

<!-- SIDEBAR FIJO -->
<aside id="sidebar">
  <div class="search-box">
    <input type="text" placeholder="Buscar..." oninput="filtrarSidebar(this.value)" />
  </div>
  <nav id="sidebarNav"></nav>
</aside>

<!-- CONTENIDO -->
<div class="home-layout">
  <main class="home-content">
    <h1 class="home-titulo">Datablog</h1>
    <div class="cat-grid" id="catGrid"></div>
    <div class="posts-header">
      <div class="posts-titulo" id="postsTitulo">Posts recientes</div>
      <div class="posts-reset" id="postsReset" onclick="resetCategoria()">← Todas</div>
    </div>
    <div class="posts-lista" id="postsList"></div>
  </main>
</div>

<script src="/assets/sidebar.js"></script>
<script src="/assets/home.js"></script>

</body>
</html>
