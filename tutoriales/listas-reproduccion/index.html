  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>Listas de Reproduccion - angelgarciadatablog</title>
  <meta name="description" content="Explora todas las listas de reproduccion de tutoriales sobre analisis de datos, SQL, Power BI, Google Analytics y mas.">
  <meta name="author" content="Angel Garcia">

  <link rel="stylesheet" href="../../styles.css">
  <link rel="icon" type="image/png" href="../../img/favicon.png">
  <meta name="theme-color" content="#0a0a0a">

  <style>
    /* ===  HERO === */
    .playlists-hero {
      padding: 80px 0 60px;
      border-bottom: 1px solid var(--border);
      text-align: center;
    }

    .playlists-hero h1 {
      font-size: 2.2rem;
      font-weight: 700;
      margin: 0 0 12px;
      color: var(--text);
    }

    .playlists-hero p {
      color: var(--text-secondary);
      font-size: 1rem;
      margin: 0 auto 32px;
      max-width: 600px;
    }

    .hero-stats {
      display: flex;
      gap: 32px;
      justify-content: center;
    }

    .hero-stat-number {
      font-size: 1.5rem;
      font-weight: 700;
      color: var(--text);
    }

    .hero-stat-label {
      font-size: 0.8rem;
      color: var(--text-secondary);
      text-transform: uppercase;
      letter-spacing: 0.05em;
    }

    /* === SORT PLAYLISTS === */
    .playlists-section {
      padding: 48px 0 80px;
    }

    .section-controls {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 24px;
      flex-wrap: wrap;
      gap: 12px;
    }

    .section-title {
      font-size: 1rem;
      font-weight: 600;
      color: var(--text-secondary);
      text-transform: uppercase;
      letter-spacing: 0.05em;
      margin: 0;
    }

    .sort-group {
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
    }

    .sort-btn {
      background: transparent;
      border: 1px solid var(--border);
      border-radius: 20px;
      color: var(--text-secondary);
      font-size: 13px;
      padding: 5px 14px;
      cursor: pointer;
      transition: all 0.2s ease;
    }

    .sort-btn:hover {
      border-color: rgba(124, 58, 237, 0.5);
      color: var(--text);
    }

    .sort-btn.active {
      border-color: rgba(124, 58, 237, 0.6);
      color: var(--text);
      background: rgba(124, 58, 237, 0.08);
    }

    /* === PLAYLIST CARD === */
    .playlists-list {
      display: flex;
      flex-direction: column;
      gap: 12px;
    }

    .playlist-card {
      background: var(--card-bg);
      border: 1px solid var(--border);
      border-left: 3px solid transparent;
      border-radius: var(--radius);
      overflow: hidden;
      transition: border-color 0.2s ease;
    }

    .playlist-card.expanded {
      border-color: rgba(124, 58, 237, 0.3);
      border-left-color: rgba(124, 58, 237, 0.7);
    }

    .playlist-card.expanded .playlist-header {
      background: rgba(124, 58, 237, 0.04);
    }

    .playlist-header {
      display: flex;
      align-items: center;
      gap: 16px;
      padding: 16px;
      cursor: pointer;
      transition: background 0.2s ease;
    }

    .playlist-header:hover {
      background: rgba(255,255,255,0.02);
    }

    .playlist-number {
      font-size: 13px;
      font-weight: 600;
      color: var(--text-secondary);
      flex-shrink: 0;
      min-width: 20px;
      text-align: right;
    }

    .playlist-thumb {
      width: 100px;
      height: 56px;
      object-fit: cover;
      border-radius: 6px;
      flex-shrink: 0;
      background: var(--surface);
    }

    .playlist-info {
      flex: 1;
      min-width: 0;
    }

    .playlist-title {
      font-size: 0.95rem;
      font-weight: 600;
      color: var(--text);
      margin: 0 0 8px;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .playlist-meta {
      display: flex;
      flex-wrap: wrap;
      gap: 12px;
    }

    .playlist-meta-item {
      display: flex;
      align-items: center;
      gap: 4px;
      font-size: 12px;
      color: var(--text-secondary);
    }

    .playlist-meta-item svg {
      opacity: 0.6;
      flex-shrink: 0;
    }

    .gained-badge {
      font-size: 11px;
      color: var(--text-secondary);
      background: rgba(255, 255, 255, 0.05);
      border-radius: 4px;
      padding: 1px 6px;
      white-space: nowrap;
    }

    .gained-badge--blue {
      color: rgba(38, 116, 237, 0.95);
      background: rgba(38, 116, 237, 0.1);
    }

    .gained-badge--red {
      color: rgba(239, 68, 68, 0.9);
      background: rgba(239, 68, 68, 0.08);
    }

    .toggle-icon {
      flex-shrink: 0;
      color: var(--text-secondary);
      transition: transform 0.25s ease;
    }

    .playlist-card.expanded .toggle-icon {
      transform: rotate(180deg);
    }

    /* === PLAYLIST CONTENT === */
    .playlist-content {
      display: none;
      border-top: 1px solid var(--border);
    }

    .playlist-card.expanded .playlist-content {
      display: block;
    }

    .content-controls {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 12px 16px;
      border-bottom: 1px solid var(--border);
      flex-wrap: wrap;
      gap: 8px;
      background: var(--surface);
    }

    .video-count-label {
      font-size: 12px;
      color: var(--text-secondary);
    }

    .video-sort-group {
      display: flex;
      gap: 6px;
    }

    .video-sort-btn {
      background: transparent;
      border: 1px solid var(--border);
      border-radius: 20px;
      color: var(--text-secondary);
      font-size: 12px;
      padding: 4px 12px;
      cursor: pointer;
      transition: all 0.2s ease;
    }

    .video-sort-btn:hover {
      border-color: rgba(124, 58, 237, 0.4);
      color: var(--text);
    }

    .video-sort-btn.active {
      border-color: rgba(124, 58, 237, 0.6);
      color: var(--text);
      background: rgba(124, 58, 237, 0.08);
    }

    /* === VIDEO LIST === */
    .videos-container {
      padding: 8px 0;
    }

    .videos-container.scrollable {
      max-height: 440px;
      overflow-y: auto;
      scrollbar-width: thin;
      scrollbar-color: rgba(124, 58, 237, 0.3) transparent;
    }

    .videos-container.scrollable::-webkit-scrollbar {
      width: 4px;
    }

    .videos-container.scrollable::-webkit-scrollbar-track {
      background: transparent;
    }

    .videos-container.scrollable::-webkit-scrollbar-thumb {
      background: rgba(124, 58, 237, 0.3);
      border-radius: 2px;
    }

    .video-item {
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 10px 16px;
      text-decoration: none;
      color: inherit;
      transition: background 0.15s ease;
      border-bottom: 1px solid var(--border);
    }

    .video-item:last-child {
      border-bottom: none;
    }

    .video-item:hover {
      background: rgba(255, 255, 255, 0.04);
    }

    .video-item:hover .video-title-text {
      color: rgba(124, 58, 237, 0.9);
    }

    .video-thumb {
      width: 100px;
      height: 56px;
      object-fit: cover;
      border-radius: 4px;
      flex-shrink: 0;
      background: var(--surface);
    }

    .video-info {
      flex: 1;
      min-width: 0;
    }

    .video-title-text {
      font-size: 0.875rem;
      font-weight: 500;
      color: var(--text);
      margin: 0 0 6px;
      display: -webkit-box;
      -webkit-line-clamp: 2;
      -webkit-box-orient: vertical;
      overflow: hidden;
      line-height: 1.4;
    }

    .video-stats-row {
      display: flex;
      align-items: center;
      gap: 12px;
      flex-wrap: wrap;
    }

    .video-stat-item {
      display: flex;
      align-items: center;
      gap: 3px;
      font-size: 12px;
      color: var(--text-secondary);
    }

    .video-stat-item svg {
      opacity: 0.6;
    }

    .new-badge {
      font-size: 10px;
      font-weight: 600;
      color: #10b981;
      background: rgba(16, 185, 129, 0.1);
      border: 1px solid rgba(16, 185, 129, 0.2);
      border-radius: 4px;
      padding: 1px 6px;
      text-transform: uppercase;
      letter-spacing: 0.05em;
    }

    .video-weekly-gained {
      font-size: 11px;
      color: rgba(124, 58, 237, 0.8);
    }

    .video-position {
      font-size: 12px;
      color: var(--text-secondary);
      flex-shrink: 0;
      min-width: 28px;
      text-align: left;
    }

    /* === LOAD MORE BUTTON === */
    .load-more-wrapper {
      padding: 8px 16px 12px;
      text-align: left;
    }

    .btn-load-more {
      background: var(--bg);
      border: none;
      border-radius: 20px;
      color: var(--text-secondary);
      font-size: 12px;
      font-weight: 500;
      padding: 6px 16px;
      cursor: pointer;
      transition: all 0.2s ease;
      position: relative;
    }

    .btn-load-more::before {
      content: '';
      position: absolute;
      inset: 0;
      border-radius: var(--radius);
      padding: 1px;
      background: var(--gradient);
      -webkit-mask: linear-gradient(#fff 0 0) content-box, linear-gradient(#fff 0 0);
      -webkit-mask-composite: xor;
      mask-composite: exclude;
    }

    .btn-load-more:hover {
      transform: translateY(-1px);
      box-shadow: 0 4px 12px rgba(124, 58, 237, 0.15);
    }

    /* === LOADING / ERROR === */
    .loading-state,
    .error-state {
      padding: 48px 0;
      text-align: center;
      color: var(--text-secondary);
    }

    .loading-spinner {
      width: 32px;
      height: 32px;
      border: 2px solid var(--border);
      border-top-color: rgba(124, 58, 237, 0.6);
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
      margin: 0 auto 16px;
    }

    @keyframes spin {
      to { transform: rotate(360deg); }
    }

    /* === RESPONSIVE === */
    @media (max-width: 640px) {
      .playlists-hero h1 { font-size: 1.6rem; }
      .playlist-thumb { width: 80px; height: 45px; }
      .video-thumb { width: 80px; height: 45px; }
      .hero-stats { gap: 20px; }
      .playlist-meta { gap: 8px; }
    }
  </style>
</head>
<body>

  <!-- Header -->
  <header class="site-header">

  <!-- Hero -->
  <section class="playlists-hero">
    <div class="container">
      <h1>Todas las <span class="gradient-text">Playlists</span></h1>
      <p>Explora todas mis listas de reproduccion sobre analisis de datos, SQL, Power BI, Google Analytics y mas.</p>
      <div class="hero-stats">
        <div>
          <div class="hero-stat-number" id="stat-playlists">-</div>
          <div class="hero-stat-label">Playlists</div>
        </div>
        <div>
          <div class="hero-stat-number" id="stat-videos">-</div>
          <div class="hero-stat-label">Videos</div>
        </div>
        <div>
          <div class="hero-stat-number" id="stat-views">-</div>
          <div class="hero-stat-label">Vistas esta semana</div>
        </div>
      </div>
    </div>
  </section>

  <!-- Playlists -->
  <section class="playlists-section">
    <div class="container">
      <div class="section-controls">
        <h2 class="section-title">Listas de reproduccion</h2>
        <div class="sort-group" id="playlist-sort-group">
          <button class="sort-btn active" data-sort="views">Mas vistas</button>
          <button class="sort-btn" data-sort="videos">Mas videos</button>
        </div>
      </div>

      <div id="playlists-list" class="playlists-list">
        <div class="loading-state">
          <div class="loading-spinner"></div>
          <p>Cargando playlists...</p>
        </div>
      </div>
    </div>
  </section>

  <script>
    const DATA_URL = 'https://storage.googleapis.com/angelgarciadatablog-analytics/weekly/view-all-playlist-videos-weekly.json';
    const INITIAL_VIDEOS = 5;

    let playlists = [];
    let currentPlaylistSort = 'views';

    // ===  UTILS ===
    function fmt(n) {
      if (!n || n === 0) return '0';
      if (n >= 1000000) return (n / 1000000).toFixed(1).replace('.0', '') + 'M';
      if (n >= 1000) return (n / 1000).toFixed(1).replace('.0', '') + 'K';
      return n.toString();
    }

    function svgEye() {
      return `<svg viewBox="0 0 24 24" fill="currentColor" width="12" height="12"><path d="M12 4.5C7 4.5 2.73 7.61 1 12c1.73 4.39 6 7.5 11 7.5s9.27-3.11 11-7.5c-1.73-4.39-6-7.5-11-7.5zM12 17c-2.76 0-5-2.24-5-5s2.24-5 5-5 5 2.24 5 5-2.24 5-5 5zm0-8c-1.66 0-3 1.34-3 3s1.34 3 3 3 3-1.34 3-3-1.34-3-3-3z"/></svg>`;
    }

    function svgThumb() {
      return `<svg viewBox="0 0 24 24" fill="currentColor" width="12" height="12"><path d="M1 21h4V9H1v12zm22-11c0-1.1-.9-2-2-2h-6.31l.95-4.57.03-.32c0-.41-.17-.79-.44-1.06L14.17 1 7.59 7.59C7.22 7.95 7 8.45 7 9v10c0 1.1.9 2 2 2h9c.83 0 1.54-.5 1.84-1.22l3.02-7.05c.09-.23.14-.47.14-.73v-2z"/></svg>`;
    }

    function svgComment() {
      return `<svg viewBox="0 0 24 24" fill="currentColor" width="12" height="12"><path d="M21.99 4c0-1.1-.89-2-1.99-2H4c-1.1 0-2 .9-2 2v12c0 1.1.9 2 2 2h14l4 4-.01-18z"/></svg>`;
    }

    function svgVideo() {
      return `<svg viewBox="0 0 24 24" fill="currentColor" width="12" height="12"><path d="M8 5v14l11-7z"/></svg>`;
    }

    function svgChevron() {
      return `<svg class="toggle-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" width="18" height="18"><path d="M6 9l6 6 6-6"/></svg>`;
    }

    // === DATA LOADING ===
    async function loadData() {
      try {
        const res = await fetch(DATA_URL);
        if (!res.ok) throw new Error('Error ' + res.status);
        const raw = await res.json();
        playlists = groupByPlaylist(raw);
        updateHeroStats();
        renderPlaylists();
      } catch (err) {
        console.error('Error cargando datos:', err);
        document.getElementById('playlists-list').innerHTML = `
          <div class="error-state">
            <p>No se pudieron cargar las playlists. Intenta recargar la pagina.</p>
            <button onclick="location.reload()" style="margin-top:16px;background:rgba(124,58,237,0.1);border:1px solid rgba(124,58,237,0.3);border-radius:8px;color:var(--text);padding:8px 20px;cursor:pointer;font-size:14px;">Recargar</button>
          </div>`;
      }
    }

    function groupByPlaylist(raw) {
      const map = {};
      let orderIndex = 0;
      raw.forEach(item => {
        if (!map[item.playlist_id]) {
          map[item.playlist_id] = {
            id: item.playlist_id,
            title: item.playlist_title,
            thumbnail: item.playlist_thumbnail_url,
            url: item.playlist_url,
            videoCount: item.playlist_video_count,
            viewsGained: item.playlist_total_views_gained || 0,
            likesGained: item.playlist_total_likes_gained || 0,
            commentsGained: item.playlist_total_comments_gained || 0,
            engagementScore: item.playlist_total_engagement_score || 0,
            order: orderIndex++,
            videos: []
          };
        }
        map[item.playlist_id].videos.push({
          id: item.video_id,
          title: item.video_title,
          thumbnail: item.video_thumbnail_url,
          url: item.video_url,
          position: item.position ?? 0,
          totalViews: item.total_views || 0,
          totalLikes: item.total_likes || 0,
          totalComments: item.total_comments || 0,
          viewsGained: item.views_gained || 0,
          likesGained: item.likes_gained || 0,
          commentsGained: item.comments_gained || 0,
          engagementScore: item.engagement_score || 0,
          isNew: item.is_new_video || false
        });
      });

      // Sort videos by position by default + compute playlist totals
      Object.values(map).forEach(p => {
        p.videos.sort((a, b) => a.position - b.position);
        p.totalViews = p.videos.reduce((s, v) => s + v.totalViews, 0);
        p.totalLikes = p.videos.reduce((s, v) => s + v.totalLikes, 0);
        p.totalComments = p.videos.reduce((s, v) => s + v.totalComments, 0);
      });

      return Object.values(map);
    }

    function updateHeroStats() {
      const totalPlaylists = playlists.length;
      const totalVideos = playlists.reduce((s, p) => s + p.videoCount, 0);
      const totalViews = playlists.reduce((s, p) => s + p.viewsGained, 0);

      document.getElementById('stat-playlists').textContent = totalPlaylists;
      document.getElementById('stat-videos').textContent = fmt(totalVideos);
      document.getElementById('stat-views').textContent = fmt(totalViews);
    }

    // === RENDER PLAYLISTS ===
    function getSortedPlaylists(sortBy) {
      const sorted = [...playlists];
      if (sortBy === 'views') sorted.sort((a, b) => b.viewsGained - a.viewsGained);
      else if (sortBy === 'videos') sorted.sort((a, b) => b.videoCount - a.videoCount);
      return sorted;
    }

    function renderPlaylists() {
      const sorted = getSortedPlaylists(currentPlaylistSort);
      const container = document.getElementById('playlists-list');
      container.innerHTML = sorted.map((p, i) => renderPlaylistCard(p, i + 1)).join('');
    }

    function renderPlaylistCard(playlist, num) {
      const placeholderThumb = 'data:image/svg+xml,%3Csvg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 56%22%3E%3Crect width=%22100%22 height=%2256%22 fill=%22%231a1a1a%22/%3E%3Cpath fill=%22%237c3aed%22 opacity=%220.4%22 d=%22M40 18l24 10-24 10z%22/%3E%3C/svg%3E';
      const thumb = playlist.thumbnail && !playlist.thumbnail.includes('no_thumbnail') ? playlist.thumbnail : placeholderThumb;

      const gainedBadges = [];
      if (playlist.viewsGained > 0) {
        const cls = playlist.viewsGained > 100 ? 'gained-badge gained-badge--blue' : 'gained-badge gained-badge--red';
        gainedBadges.push(`<span class="${cls}">${fmt(playlist.viewsGained)} views last week</span>`);
      }
      if (playlist.likesGained > 0) {
        const cls = playlist.likesGained > 5 ? 'gained-badge gained-badge--blue' : 'gained-badge gained-badge--red';
        gainedBadges.push(`<span class="${cls}">${fmt(playlist.likesGained)} likes last week</span>`);
      }
      if (playlist.commentsGained > 0) {
        const cls = playlist.commentsGained > 1 ? 'gained-badge gained-badge--blue' : 'gained-badge gained-badge--red';
        gainedBadges.push(`<span class="${cls}">${fmt(playlist.commentsGained)} comments last week</span>`);
      }

      return `
        <div class="playlist-card" data-id="${playlist.id}">
          <div class="playlist-header" onclick="togglePlaylist('${playlist.id}')">
            <span class="playlist-number">${num}</span>
            <img class="playlist-thumb" src="${thumb}" alt="${playlist.title}" loading="lazy" onerror="this.src='${placeholderThumb}'">
            <div class="playlist-info">
              <h3 class="playlist-title">${playlist.title}</h3>
              <div class="playlist-meta">
                <span class="playlist-meta-item">${svgVideo()} ${playlist.videoCount} videos</span>
                <span class="playlist-meta-item">${svgEye()} ${fmt(playlist.totalViews)}</span>
                <span class="playlist-meta-item">${svgThumb()} ${fmt(playlist.totalLikes)}</span>
                <span class="playlist-meta-item">${svgComment()} ${fmt(playlist.totalComments)}</span>
                ${gainedBadges.join('')}
              </div>
            </div>
            ${svgChevron()}
          </div>
          <div class="playlist-content" id="content-${playlist.id}">
            <div class="content-controls">
              <span class="video-count-label">${playlist.videos.length} videos cargados</span>
              <div class="video-sort-group" id="vsort-${playlist.id}">
                <button class="video-sort-btn active" data-psort="position" onclick="sortPlaylistVideos('${playlist.id}', 'position', this)">Orden</button>
                <button class="video-sort-btn" data-psort="totalViews" onclick="sortPlaylistVideos('${playlist.id}', 'totalViews', this)">Mas vistos</button>
                <button class="video-sort-btn" data-psort="totalLikes" onclick="sortPlaylistVideos('${playlist.id}', 'totalLikes', this)">Mas likes</button>
                <button class="video-sort-btn" data-psort="totalComments" onclick="sortPlaylistVideos('${playlist.id}', 'totalComments', this)">Mas comentarios</button>
              </div>
            </div>
            <div class="videos-container" id="vc-${playlist.id}">
              ${renderVideoList(playlist.id, playlist.videos, 'position')}
            </div>
          </div>
        </div>`;
    }

    function renderVideoList(playlistId, videos, sortBy) {
      const sorted = getSortedVideos(videos, sortBy);
      const initial = sorted.slice(0, INITIAL_VIDEOS);
      const remaining = sorted.slice(INITIAL_VIDEOS);

      const initialHTML = initial.map((v, i) => renderVideoItem(v, i + 1, sorted.length)).join('');
      const remainingHTML = remaining.length > 0
        ? `<div class="hidden-videos" id="hv-${playlistId}" style="display:none">${remaining.map((v, i) => renderVideoItem(v, INITIAL_VIDEOS + i + 1, sorted.length)).join('')}</div>
           <div class="load-more-wrapper" id="lmw-${playlistId}">
             <button class="btn-load-more" onclick="loadMore('${playlistId}')">
               Cargar mas videos (${remaining.length} restantes)
             </button>
           </div>`
        : '';

      return initialHTML + remainingHTML;
    }

    function renderVideoItem(video, displayPos, total) {
      const placeholderThumb = 'data:image/svg+xml,%3Csvg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 56%22%3E%3Crect width=%22100%22 height=%2256%22 fill=%22%231a1a1a%22/%3E%3Cpath fill=%22%237c3aed%22 opacity=%220.3%22 d=%22M40 20l20 8-20 8z%22/%3E%3C/svg%3E';
      const thumb = video.thumbnail && !video.thumbnail.includes('no_thumbnail') ? video.thumbnail : placeholderThumb;

      const newBadge = video.isNew ? '<span class="new-badge">Nuevo</span>' : '';
      const weeklyGained = video.viewsGained > 0 ? `<span class="video-weekly-gained">${fmt(video.viewsGained)} esta semana</span>` : '';

      return `
        <a class="video-item" href="${video.url}" target="_blank" rel="noopener noreferrer">
          <span class="video-position">${displayPos}/${total}</span>
          <img class="video-thumb" src="${thumb}" alt="${video.title}" loading="lazy" onerror="this.src='${placeholderThumb}'">
          <div class="video-info">
            <p class="video-title-text">${video.title}</p>
            <div class="video-stats-row">
              <span class="video-stat-item">${svgEye()} ${fmt(video.totalViews)}</span>
              <span class="video-stat-item">${svgThumb()} ${fmt(video.totalLikes)}</span>
              <span class="video-stat-item">${svgComment()} ${fmt(video.totalComments)}</span>
              ${weeklyGained}
              ${newBadge}
            </div>
          </div>
        </a>`;
    }

    // === INTERACTIONS ===
    function togglePlaylist(id) {
      const card = document.querySelector(`[data-id="${id}"]`);
      card.classList.toggle('expanded');
    }

    function getSortedVideos(videos, sortBy) {
      const sorted = [...videos];
      if (sortBy === 'position') sorted.sort((a, b) => a.position - b.position);
      else if (sortBy === 'totalViews') sorted.sort((a, b) => b.totalViews - a.totalViews);
      else if (sortBy === 'totalLikes') sorted.sort((a, b) => b.totalLikes - a.totalLikes);
      else if (sortBy === 'totalComments') sorted.sort((a, b) => b.totalComments - a.totalComments);
      return sorted;
    }

    function sortPlaylistVideos(playlistId, sortBy, btn) {
      // Update active button
      document.querySelectorAll(`#vsort-${playlistId} .video-sort-btn`).forEach(b => b.classList.remove('active'));
      btn.classList.add('active');

      // Re-render video list
      const playlist = playlists.find(p => p.id === playlistId);
      if (!playlist) return;

      const container = document.getElementById(`vc-${playlistId}`);
      const isScrollable = container.classList.contains('scrollable');

      container.innerHTML = renderVideoList(playlistId, playlist.videos, sortBy);

      if (isScrollable) {
        container.classList.add('scrollable');
        const hv = document.getElementById(`hv-${playlistId}`);
        const lmw = document.getElementById(`lmw-${playlistId}`);
        if (hv) hv.style.display = 'block';
        if (lmw) lmw.style.display = 'none';
      }
    }

    function loadMore(playlistId) {
      const hv = document.getElementById(`hv-${playlistId}`);
      const lmw = document.getElementById(`lmw-${playlistId}`);
      const vc = document.getElementById(`vc-${playlistId}`);

      if (hv) hv.style.display = 'block';
      if (lmw) lmw.style.display = 'none';
      if (vc) vc.classList.add('scrollable');
    }

    // === PLAYLIST SORT ===
    document.getElementById('playlist-sort-group').addEventListener('click', e => {
      const btn = e.target.closest('.sort-btn');
      if (!btn) return;
      document.querySelectorAll('#playlist-sort-group .sort-btn').forEach(b => b.classList.remove('active'));
      btn.classList.add('active');
      currentPlaylistSort = btn.dataset.sort;
      renderPlaylists();
    });

    // === MENU TOGGLE ===
    const menuToggle = document.querySelector('.menu-toggle');
    const menu = document.querySelector('.menu');
    if (menuToggle && menu) {
      menuToggle.addEventListener('click', () => {
        const isOpen = menu.classList.toggle('open');
        menuToggle.setAttribute('aria-expanded', String(isOpen));
      });
    }

    // Init
    loadData();
  </script>
</body>
</html>
